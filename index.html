<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Live2D Vibe</title>
    <style>
        body { margin: 0; overflow: hidden; background: #cccccc; }
        canvas { width: 100vw; height: 100vh; }
    </style>
    
    <!-- 1. PIXI 核心 (v6.5.2 絕對穩定版，必須最先載入) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/6.5.2/browser/pixi.min.js"></script>
    
    <!-- 2. Live2D 官方 Cubism 核心 -->
    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
    
    <!-- 3. Live2D 顯示插件 (移除 beta 標籤，使用穩定正式版) -->
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/index.min.js"></script>

</head>
<body>
    <canvas id="canvas"></canvas>
    <!-- 用新的參數強迫瀏覽器抓最新的 JavaScript -->
    <script src="src/main.js?v=final"></script>
</body>
</html>
